# Netlify Configuration File
# Documentation: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # The directory containing the built static files
  publish = "dist"
  
  # The build command to run
  command = "npm run build"
  
  # Netlify Functions directory
  functions = "netlify/functions"

# Route /api/grammar-check → Netlify Function
[[redirects]]
  from = "/api/grammar-check"
  to = "/.netlify/functions/grammar-check"
  status = 200
  force = true

# Route /api/conjugate → Netlify Function
[[redirects]]
  from = "/api/conjugate"
  to = "/.netlify/functions/conjugate"
  status = 200
  force = true

# SPA routing redirect rule (must come LAST):
# Rewrites all other requests to /index.html for React Router.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
